name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Index module on proxy.golang.org
        # Makes `go get github.com/shotah/youtube-go-mcp@${{ github.ref_name }}` resolve quickly.
        run: |
          curl -fsSL "https://proxy.golang.org/github.com/shotah/youtube-go-mcp/@v/${GITHUB_REF_NAME}.info" || true
